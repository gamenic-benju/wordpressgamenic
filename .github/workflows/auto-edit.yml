name: Auto Edit Evidence

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  edit-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Edit file with timestamp
        run: |
          echo "Last updated by GitHub Actions on $(date -u)" > last-updated.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git commit -m "chore: auto-edit by GitHub Actions [$(date -u)]"
          git push
