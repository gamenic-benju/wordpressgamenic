name: Claude Code Issue Workflow

on:
  issues:
    types: [opened]

jobs:
  claude-respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Claude AI response for issue
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          RESPONSE=$(python3 -c "
          import json, urllib.request, os

          payload = {
            'model': 'claude-haiku-4-5-20251001',
            'max_tokens': 1024,
            'messages': [
              {
                'role': 'user',
                'content': 'You are a helpful developer assistant. A GitHub issue has been created. Analyze it and provide a brief action plan.\n\nIssue Title: ' + os.environ.get('ISSUE_TITLE', '') + '\n\nIssue Body: ' + os.environ.get('ISSUE_BODY', '(no description)')
              }
            ]
          }

          req = urllib.request.Request(
            'https://api.anthropic.com/v1/messages',
            data=json.dumps(payload).encode(),
            headers={
              'x-api-key': os.environ['ANTHROPIC_API_KEY'],
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json'
            }
          )
          res = urllib.request.urlopen(req)
          data = json.loads(res.read())
          print(data['content'][0]['text'])
          ")

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Claude response as comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Claude Code Analysis:**\n\n${{ steps.claude.outputs.comment }}`
            })
