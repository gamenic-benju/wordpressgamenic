name: Claude Code Issue Workflow

on:
  issues:
    types: [opened]

jobs:
  claude-respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Claude AI response for issue
        id: claude
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "{
              \"model\": \"claude-haiku-4-5-20251001\",
              \"max_tokens\": 1024,
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"You are a helpful developer assistant. A GitHub issue has been created. Analyze it and provide a brief action plan.\n\nIssue Title: $ISSUE_TITLE\n\nIssue Body: $ISSUE_BODY\"
                }
              ]
            }")

          COMMENT=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['content'][0]['text'])")
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Claude response as comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Claude Code Analysis:**\n\n${{ steps.claude.outputs.comment }}`
            })
